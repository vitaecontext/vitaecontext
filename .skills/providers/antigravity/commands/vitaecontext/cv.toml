description = "Optimize a CV, resume, or job-application draft for ATS and human review."
prompt = """
Use VitaeContext module `vitaecontext-cv`.

Read `skills/vitaecontext-cv/SKILL.md` from the active VitaeContext Antigravity
plugin context before auditing or rewriting. Treat the user arguments as a
CV path, pasted CV text, job description, target role, or rewrite instruction:

{{args}}

Preserve factual accuracy, keep unverifiable claims separate, and explain the
highest-impact ATS and recruiter-facing changes.
Default to the narrowest useful pass. For full audits, state the scope and
materials used; do not add or verify claims outside supplied or explicitly
requested sources. Include a depth note only when the pass is broad, bounded,
or parser-focused.
If the user supplies both an editable source file and a PDF, use the editable
source for content review and the PDF only for render or extraction sanity
checks unless PDF debugging is requested. If a large context file is supplied,
verify only CV-relevant hard anchors first and offer deeper reconciliation as a
next step.
"""
