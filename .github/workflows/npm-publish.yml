name: Publish npm package

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package version
        run: |
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${package_version}."
            exit 1
          fi

      - name: Verify provider metadata versions
        run: |
          node --input-type=module -e '
            import fs from "node:fs";
            const packageVersion = JSON.parse(fs.readFileSync("package.json", "utf8")).version;
            const files = [
              ".skills/providers/gemini-cli/extension/gemini-extension.json",
              ".skills/providers/antigravity/extension/gemini-extension.json"
            ];
            for (const file of files) {
              const version = JSON.parse(fs.readFileSync(file, "utf8")).version;
              if (version !== packageVersion) {
                console.error(`${file} version ${version} does not match package.json version ${packageVersion}.`);
                process.exit(1);
              }
            }
          '

      - name: Validate package layout
        run: npm run validate

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write

    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "vitaecontext $TAG_NAME" \
            --notes "Npm package: https://www.npmjs.com/package/vitaecontext"
